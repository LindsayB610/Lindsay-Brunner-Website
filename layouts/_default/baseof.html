<!doctype html>
<html lang="en">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="{{ if .IsHome }}page-home{{ else }}page-{{ .Section | default .Type | urlize }}{{ end }}">

    <main role="main">{{ block "main" . }}{{ end }}</main>

    {{ partial "footer.html" . }}
  </body>
</html>
